<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Curator</title>
</head>

<body style="
    margin:0;
    padding:0;
    background:#f8fafc;
    font-family:Arial,sans-serif;
    color:#0f172a;
">

<div style="
    max-width:640px;
    margin:0 auto;
    padding:60px 32px;
">

    <!-- brand -->
    <div style="margin-bottom:56px;">

        <h1 style="
            margin:0;
            font-size:32px;
            color:#f97316;
            font-weight:700;
        ">
            The Curator
        </h1>

    </div>

    <!-- content -->
    <div style="
        background:white;
        border-radius:24px;
        padding:48px;
        box-shadow:0 10px 40px rgba(15,23,42,0.06);
    ">

        <div style="
            width:52px;
            height:52px;
            border-radius:50%;
            background:#fff7ed;
            text-align:center;
            line-height:52px;
            font-size:24px;
            margin-bottom:32px;
        ">
            ⚠️
        </div>

        <h2 style="
            margin:0;
            font-size:34px;
            line-height:1.2;
            font-weight:700;
            color:#0f172a;
        ">
            Asset marked as broken
        </h2>

        <p style="
            margin-top:24px;
            font-size:17px;
            line-height:1.8;
            color:#475569;
        ">
            We noticed that asset
            <strong style="color:#f97316;">
                {{serialNumber}}
            </strong>
            has been marked as broken and may require technical inspection.
        </p>

        <div style="
            margin-top:40px;
            padding-top:24px;
            border-top:1px solid #e2e8f0;
        ">

            <p style="
                margin:0;
                font-size:14px;
                color:#94a3b8;
                line-height:1.7;
            ">
                This message was sent automatically by
                The Curator asset management platform.
            </p>

        </div>

    </div>

</div>

</body>
</html>
