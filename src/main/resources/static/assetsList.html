<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>The Curator | Assets</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(11, 19, 38, 0.7);
            backdrop-filter: blur(12px);
        }
    </style>
</head>

<body class="min-h-screen">

<div class="flex">

    <!-- SIDEBAR -->
    <aside class="hidden md:flex flex-col w-64 p-6 bg-[#0b1326] border-r border-white/5 shadow-[0_0_40px_rgba(0,0,0,0.4)]">
        <h1 class="text-xl font-bold text-orange-400 mb-8">The Curator</h1>

        <nav class="space-y-2">
            <a class="flex items-center gap-3 px-4 py-2 hover:bg-[#171f33] rounded shadow-md">
                <span class="material-symbols-outlined">dashboard</span>
                Dashboard
            </a>

            <a class="flex items-center gap-3 px-4 py-2 bg-[#171f33] text-orange-300 rounded shadow-md">
                <span class="material-symbols-outlined">inventory_2</span>
                Assets
            </a>

            <a class="flex items-center gap-3 px-4 py-2 hover:bg-[#171f33] rounded shadow-md">
                <span class="material-symbols-outlined">meeting_room</span>
                Rooms
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 px-10 py-14 space-y-20 max-w-7xl mx-auto">

        <!-- TOP BAR -->
        <div class="flex justify-between items-center glass p-4 rounded-xl shadow-lg">

            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-orange-400">inventory</span>
                <h2 class="text-2xl font-bold">Inventory</h2>
            </div>

            <div class="flex items-center gap-4">

                <!-- SEARCH -->
                <div class="flex items-center gap-3">

                    <!-- search -->
                    <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">
            search
        </span>
                        <input
                                id="search-input"
                                class="bg-[#171f33] pl-10 pr-4 py-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-orange-400"
                                placeholder="Search serial..."
                        />
                    </div>

                    <!-- status filter -->
                    <select
                            id="status-filter"
                            class="bg-[#171f33] px-4 py-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-orange-400"
                    >
                        <option value="">All Status</option>
                        <option value="AVAILABLE">Available</option>
                        <option value="IN_USE">In Use</option>
                        <option value="MAINTENANCE">Maintenance</option>
                        <option value="BROKEN">Broken</option>
                    </select>

                    <!-- type filter -->
                    <select
                            id="type-filter"
                            class="bg-[#171f33] px-4 py-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-orange-400"
                    >
                        <option value="">All Types</option>
                    </select>

                    <button
                            id="reset-filters"
                            class="bg-[#171f33] px-4 py-2 rounded-lg text-sm hover:bg-orange-500 hover:text-black transition"
                    >
                        Reset
                    </button>

                </div>

                <span class="material-symbols-outlined text-gray-400 cursor-pointer hover:text-orange-400">
                    notifications
                </span>

                <button id="add-asset-btn"
                        class="bg-orange-500 px-4 py-2 rounded-lg text-black font-semibold hover:scale-105 transition">
                    + Add
                </button>

            </div>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">

            <!-- TOTAL -->
            <div class="bg-[#111827] border border-white/5 p-6 rounded-xl text-center">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">
                    Total
                </p>
                <p id="total-assets" class="text-4xl font-extrabold text-orange-400">
                    0
                </p>
            </div>

            <!-- IN USE -->
            <div class="bg-[#111827] border border-white/5 p-6 rounded-xl text-center">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">
                    In Use
                </p>
                <p id="in-use-assets" class="text-4xl font-extrabold text-orange-400">
                    0
                </p>
            </div>

            <!-- MAINTENANCE -->
            <div class="bg-[#111827] border border-white/5 p-6 rounded-xl text-center">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">
                    Maintenance
                </p>
                <p id="maintenance-assets" class="text-4xl font-extrabold text-orange-400">
                    0
                </p>
            </div>

        </div>

        <!-- GRID -->
        <div id="assets-container"
             class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mt-10">
        </div>

    </main>
</div>

<!-- ASSIGN MODAL -->
<div id="quick-assign-modal"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

    <div class="bg-[#171f33] p-6 rounded-xl w-80">
        <h3 class="mb-4 font-bold">Assign to room</h3>

        <select id="quick-room-select"
                class="w-full p-2 mb-4 bg-[#0b1326] border border-gray-600 rounded">
        </select>

        <div class="flex justify-end gap-2">
            <button id="quick-assign-cancel">Cancel</button>
            <button id="quick-assign-confirm"
                    class="bg-orange-500 px-3 py-1 rounded text-black">
                Assign
            </button>
        </div>
    </div>
</div>

<!-- ADD ASSET MODAL -->
<div id="asset-modal"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

    <div class="bg-[#171f33] p-6 rounded-xl w-96 space-y-4">

        <h3 class="font-bold text-lg">Add Asset</h3>

        <select id="asset-model-select"
                class="w-full p-2 bg-[#0b1326] border border-gray-600 rounded"></select>


        <select id="asset-type-select"
                class="w-full p-2 bg-[#0b1326] border border-gray-600 rounded">
        </select>

        <input id="serial-number"
               placeholder="Serial number"
               class="w-full p-2 bg-[#0b1326] border border-gray-600 rounded"/>

        <div class="flex justify-end gap-2">
            <button id="close-modal">Cancel</button>
            <button id="submit-asset"
                    class="bg-orange-500 px-3 py-1 rounded text-black">
                Create
            </button>
        </div>

    </div>
</div>


<div id="toast"
     class="fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-lg opacity-0 transition-opacity duration-300 text-white bg-orange-500">
    Message
</div>

<script type="module" src="/js/main.js"></script>

</body>
</html>
